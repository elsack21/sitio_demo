<!DOCTYPE html> <!-- Indica que el documento es HTML5, la versión estándar actual -->

<html lang="es"> <!-- Abre el documento HTML y especifica que el idioma principal es español -->
<head><!-- Sección de cabecera: aquí van configuraciones y enlaces, no contenido visible -->

    <meta charset="UTF-8"> <!-- Define la codificación de caracteres como UTF-8, para que se muestren bien acentos y caracteres especiales -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que la página sea responsive: adapta el contenido al ancho de la pantalla del dispositivo -->

    <Title>Prototipo Web</Title> <!-- Título de la página, aparece en la pestaña del navegador -->
    <link rel="stylesheet" href="style.css"> <!-- Conecta el archivo CSS externo llamado style.css, donde están los estilos visuales -->

</head>
<body> <!-- Sección visible de la página: aquí va el contenido que el usuario ve -->
    <img src="imagenes/titulo.png" alt="Explora mi sitio web"> 
    <!-- Inserta una imagen (tu título en PNG). El atributo alt describe la imagen si no se carga -->
    <a href="servicios/servicios.html" class="buttonClass">Explorar</a> <!-- Crea un botón. -->
</body> <!-- Cierra la sección visible de la página -->
